    // ==================== 战斗系统 ====================
    function spawnEnemies() {
        G.enemies = [];
        const isBoss = G.chapter === G.maxChapter;
        const clsDmgMult = 0.8 + G.chapter * 0.15;

        if (isBoss) {
            const boss = BOSS_TEMPLATES[G.chapter - 1] || BOSS_TEMPLATES[0];
            G.enemies.push({...boss, hp: Math.floor(boss.hp * clsDmgMult), maxHp: Math.floor(boss.hp * clsDmgMult)});
        } else {
            const count = 2;
            const usedNames = new Set();
            for (let i = 0; i < count; i++) {
                let tmpl;
                do { tmpl = ENEMY_TEMPLATES[Math.floor(Math.random() * ENEMY_TEMPLATES.length)]; }
                while (usedNames.has(tmpl.name) && usedNames.size < ENEMY_TEMPLATES.length);
                usedNames.add(tmpl.name);
                G.enemies.push({
                    ...tmpl,
                    hp: Math.floor(tmpl.hp * clsDmgMult),
                    maxHp: Math.floor(tmpl.hp * clsDmgMult),
                    poison: 0, poisonTurns: 0,
                    marked: false, markedTurns: 0,
                });
            }
        }
    }

    function drawCards(n) {
        for (let i = 0; i < n; i++) {
            if (G.hand.length >= 10) break; // 手牌上限10张
            if (G.deck.length === 0) {
                if (G.discard.length === 0) break;
                // discard 中存的是字符串ID，转换回卡牌对象再洗牌
                G.deck = G.discard.filter(id => ALL_CARDS[id]).map(id => ({...ALL_CARDS[id]}));
                G.discard = [];
                shuffle(G.deck);
            }
            if (G.deck.length > 0) {
                const card = G.deck.pop();
                // 给卡牌实例一个唯一ID（用于丢弃时定位）
                card._instId = Math.random().toString(36).substr(2, 5);
                G.hand.push(card);
            }
        }
    }

    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }

    function renderAll() {
        // 安全检查：如果所有敌人已死但没触发结束，补一次checkDead
        if (G.enemies && G.enemies.length > 0 && G.enemies.every(e => e.hp <= 0)) {
            checkDead();
            return;
        }
        renderEnemies();
        renderPlayer();
        renderHand();
        document.getElementById('rGold').textContent = G.gold;
        document.getElementById('rChapter').textContent = G.chapter;
        document.getElementById('rEnergy').textContent = G.energy;
        document.getElementById('rMaxEnergy').textContent = G.maxEnergy;
        document.getElementById('healCount').textContent = G.healPots;
        document.getElementById('turnInfo').textContent = `回合 ${G.turn}`;
        // 连击计数器（剑侠特色）
        const comboEl = document.getElementById('comboDisplay');
        if (G.player && G.player.class === 'sword' && G.comboCount > 0) {
            comboEl.style.display = '';
            document.getElementById('rCombo').textContent = G.comboCount;
        } else {
            comboEl.style.display = 'none';
        }
        document.getElementById('btnHeal').disabled = G.healPots <= 0;
    }

    function renderEnemies() {
        const list = document.getElementById('enemyList');
        list.innerHTML = '';
        G.enemies.forEach((e, i) => {
            const dead = e.hp <= 0;
            const targeted = G.targetEnemy === i;
            const hpPct = Math.max(0, e.hp / e.maxHp * 100);
            let dbTags = '';
            if (e.poison > 0) dbTags += `<span class="enemy-debuff-tag">毒${e.poison}</span>`;
            if (e.marked) dbTags += `<span class="enemy-debuff-tag">标记</span>`;
            if (e.wounded) dbTags += `<span class="enemy-debuff-tag">重伤</span>`;
            if (e.weakened > 0) dbTags += `<span class="enemy-debuff-tag">弱${e.weakened}</span>`;
            if (e.armorBreakTurns > 0) dbTags += `<span class="enemy-debuff-tag">破甲${e.armorBreakTurns}</span>`;
            list.innerHTML += `
              <div class="enemy-card ${dead?'dead':''} ${targeted?'targeted':''}" onclick="selectEnemy(${i})">
                <div class="enemy-portrait">
                  <img src="${e.img||''}" alt="${e.name}">
                  <div class="enemy-name-overlay">
                    <div class="enemy-name">${e.name}</div>
                    <div class="enemy-stats-text">${e.atk}攻 ${e.def}防${e.evadeRate > 0 ? ` ${Math.floor(e.evadeRate*100)}%闪` : ''}</div>
                  </div>
                  ${dbTags?`<div class="enemy-debuff-tags">${dbTags}</div>`:''}
                </div>
                <div class="enemy-hp-bar">
                  <div class="enemy-hp-fill" style="width:${hpPct}%"></div>
                  <div class="enemy-hp-text-bar">${Math.max(0,e.hp)} / ${e.maxHp}</div>
                </div>
              </div>`;
        });
    }

    function renderPlayer() {
        const p = G.player;
        const hpPct = Math.max(0, p.hp / p.maxHp * 100);

        let buffs = [];
        if (G.stealth > 0) buffs.push(`<span class="buff-tag special">潜行${G.stealth}</span>`);
        if (G.absoluteEvade > 0) buffs.push(`<span class="buff-tag buff">闪避×${G.absoluteEvade}</span>`);
        if (G.evadeBuff > 0) buffs.push(`<span class="buff-tag buff">闪避+${Math.floor(G.evadeBuff*100)}%</span>`);
        if (G.block > 0) buffs.push(`<span class="buff-tag buff">格挡${G.block}</span>`);
        if (G.shield > 0) buffs.push(`<span class="buff-tag buff">护盾${G.shield}</span>`);
        if (G.thorns > 0) buffs.push(`<span class="buff-tag special">荆棘${G.thorns}</span>`);
        if (G.fumoCounter > 0) buffs.push(`<span class="buff-tag special">伏魔</span>`);
        if (G.xiaoyaoActive) buffs.push(`<span class="buff-tag special">逍遥${G.xiaoyaoDmg || 0}</span>`);
        if (G.counterReflect > 0) buffs.push(`<span class="buff-tag special">反震</span>`);
        if (G.absorbRedirect) buffs.push(`<span class="buff-tag special">无相转</span>`);
        if (G.lifestealThisTurn > 0) buffs.push(`<span class="buff-tag special">饮血${Math.floor(G.lifestealThisTurn*100)}%</span>`);
        if (G.freeNextAttack) buffs.push(`<span class="buff-tag buff">攻击免费</span>`);
        if (G.freeAttackOnDodge) buffs.push(`<span class="buff-tag buff">闪避免费</span>`);
        if (G.autoCounter > 0) buffs.push(`<span class="buff-tag special">反击${G.autoCounter}</span>`);
        if (G.nextAttackBuff > 0) buffs.push(`<span class="buff-tag buff">蓄力${Math.floor(G.nextAttackBuff*100)}%</span>`);
        if (G.stackAtk > 0) buffs.push(`<span class="buff-tag buff">剑意+${G.stackAtk}</span>`);
        if (G.damageBuff > 0) buffs.push(`<span class="buff-tag buff">攻+${Math.floor(G.damageBuff*100)}%</span>`);
        if (G.critBuff > 0) buffs.push(`<span class="buff-tag buff">暴击+${Math.floor(G.critBuff*100)}%</span>`);
        if (G.immune) buffs.push(`<span class="buff-tag special">无敌</span>`);
        if (!G.immortalTriggered) buffs.push(`<span class="buff-tag special">不死</span>`);
        if (G.lifestealTurns > 0) buffs.push(`<span class="buff-tag special">吸血${G.lifestealTurns}</span>`);
        if (G.plagueAura > 0) buffs.push(`<span class="buff-tag special">瘟疫${G.plagueAura}</span>`);
        if (G.evadeOverTime > 0) buffs.push(`<span class="buff-tag buff">凌波${G.evadeOverTime}</span>`);
        if (G.freeEpicLegend) buffs.push(`<span class="buff-tag special">免费</span>`);

        document.getElementById('playerCard').innerHTML = `
            <div class="player-portrait">
                <img src="${p.img || CLASSES[p.class]?.img || ''}" alt="${p.name}">
                <div class="player-name-overlay">
                    <div class="player-name">${p.name}</div>
                    <div class="player-stats-text">${p.atk}攻 ${p.def}防</div>
                </div>
            </div>
            <div class="player-hp-bar">
                <div class="player-hp-fill" style="width:${hpPct}%"></div>
                <div class="player-hp-text-bar">${p.hp} / ${p.maxHp}</div>
            </div>
            <div class="player-buffs">${buffs.join('')}</div>
        `;
    }

    function renderHand() {
        const list = document.getElementById('handList');
        list.innerHTML = '';
        document.getElementById('handCount').textContent = G.hand.length;
        document.getElementById('drawCount').textContent = G.deck.length;
        document.getElementById('discardCount').textContent = G.discard.length;
        // 全牌组 = 抽牌堆 + 手牌 + 弃牌堆
        document.getElementById('deckCount').textContent = G.deck.length + G.hand.length + G.discard.length;
        const n = G.hand.length;
        if (n === 0) return;

        // 扇形参数
        const maxAngle = Math.min(6, 35 / n); // 每张牌的角度
        const totalAngle = maxAngle * (n - 1);
        const startAngle = -totalAngle / 2;
        const fanRadius = 600; // 扇形半径（更大更展开）
        const centerX = list.offsetWidth / 2 || 190;

        G.hand.forEach((card, i) => {
            // 只要能量够就能拖（不再预判目标）
            let effectiveCost = card.cost;
            if (G.freeEpicLegend && (card.rarity === 'epic' || card.rarity === 'legend')) effectiveCost = 0;
            if (G.freeNextAttack && card.type === 'attack') effectiveCost = 0;
            const canAfford = G.energy >= effectiveCost;

            let cantPlay = false;
            if (card.effect === 'sacrifice_damage' || card.effect === 'sacrifice_aoe' || card.effect === 'sacrifice_big') {
                const costHp = card.costHp || Math.floor(G.player.hp * card.costPct);
                if (G.player.hp <= costHp) cantPlay = true;
            }
            const rarityDot = card.rarity === 'legend' ? '◆' : card.rarity === 'epic' ? '◇' : card.rarity === 'rare' ? '○' : '';
            let kwTags = '';
            if (card.exhaust) kwTags += '<span class="kw-tag exhaust">消耗</span>';
            if (card.retain) kwTags += '<span class="kw-tag retain">保留</span>';
            if (card.innate) kwTags += '<span class="kw-tag innate">固有</span>';
            const isFree = (G.freeEpicLegend && (card.rarity === 'epic' || card.rarity === 'legend')) || (G.freeNextAttack && card.type === 'attack');
            const displayCost = card.costX ? 'X' : (isFree ? 0 : card.cost);

            // 扇形位置计算
            const angle = n === 1 ? 0 : startAngle + maxAngle * i;
            const rad = angle * Math.PI / 180;
            const offsetX = Math.sin(rad) * fanRadius;
            const offsetY = (1 - Math.cos(rad)) * fanRadius * 0.15;
            const leftPos = centerX + offsetX - 55;

            const el = document.createElement('div');
            el.className = `card-item ${card.type} ${!canAfford || cantPlay ? 'cant-play' : ''}`;
            el.style.left = leftPos + 'px';
            el.style.bottom = (10 - offsetY) + 'px';
            el.style.transform = `rotate(${angle}deg)`;
            el.style.zIndex = i + 1;
            el.innerHTML = `
                ${rarityDot ? `<div class="card-rarity-dot ${card.rarity}">${rarityDot}</div>` : ''}
                <div class="card-cost ${isFree ? 'free' : ''}">${displayCost}</div>
                <div class="card-icon">${card.icon}</div>
                <div class="card-name">${card.name}</div>
                <div class="card-desc">${card.desc}</div>
                ${kwTags ? `<div class="card-kw">${kwTags}</div>` : ''}
                <div class="card-type-tag">${card.type === 'attack' ? '攻' : card.type === 'defense' ? '防' : card.type === 'mobility' ? '机' : '特'}</div>
            `;

            // 拖放逻辑（含长按预览）
            if (canAfford && !cantPlay) {
                let isDragging = false;
                let startX, startY;
                let longPressTimer = null;
                let longPressTriggered = false;

                const onStart = (e) => {
                    e.preventDefault();
                    const pt = e.touches ? e.touches[0] : e;
                    startX = pt.clientX; startY = pt.clientY;
                    isDragging = false;
                    longPressTriggered = false;

                    // 触屏设备：300ms 长按预览
                    if (e.touches) {
                        longPressTimer = setTimeout(() => {
                            longPressTriggered = true;
                            showCardPreview(i);
                        }, 300);
                    }

                    const onMove = (ev) => {
                        const p = ev.touches ? ev.touches[0] : ev;
                        const dx = p.clientX - startX, dy = p.clientY - startY;
                        if (!isDragging && Math.abs(dx) + Math.abs(dy) > 10) {
                            // 开始拖动 → 取消长按预览
                            if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
                            if (longPressTriggered) { hideCardPreview(); longPressTriggered = false; }
                            isDragging = true;
                            el.classList.add('dragging');
                            el.style.position = 'fixed';
                            el.style.transition = 'none';
                            // 拖起时：预高亮所有合法目标
                            showValidTargets(card.type);
                        }
                        if (isDragging) {
                            el.style.left = (p.clientX - 55) + 'px';
                            // 触屏：卡牌偏移到手指上方120px，避免被手指遮挡
                            const yOffset = ev.touches ? 130 : 75;
                            el.style.top = (p.clientY - yOffset) + 'px';
                            el.style.bottom = 'auto';
                            // 精确悬停时加强高亮
                            highlightHoverTarget(p.clientX, p.clientY);
                        }
                    };

                    const onEnd = (ev) => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onEnd);
                        document.removeEventListener('touchmove', onMove);
                        document.removeEventListener('touchend', onEnd);
                        clearDropHighlights();

                        // 取消长按计时器
                        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }

                        // 长按预览模式：松手只关闭预览，不出牌
                        if (longPressTriggered) {
                            hideCardPreview();
                            longPressTriggered = false;
                            renderHand();
                            return;
                        }

                        if (isDragging) {
                            const p = ev.changedTouches ? ev.changedTouches[0] : ev;
                            const target = getDropTarget(p.clientX, p.clientY);

                            if (card.type === 'attack') {
                                // 攻击牌 → 必须放到敌人身上
                                if (target && target.type === 'enemy') {
                                    G.targetEnemy = target.idx;
                                    G.selectedCard = i;
                                    playCard();
                                } else {
                                    showFB('攻击牌需要释放到敌人身上！', 'info');
                                }
                            } else if (card.type === 'defense' || card.type === 'mobility') {
                                // 防御/机动牌 → 放到自己身上
                                if (target && target.type === 'player') {
                                    G.selectedCard = i;
                                    playCard();
                                } else {
                                    showFB('请将卡牌拖到自己身上释放！', 'info');
                                }
                            } else {
                                // 特殊牌 → 敌人或自己都可以
                                if (target && target.type === 'enemy') {
                                    G.targetEnemy = target.idx;
                                    G.selectedCard = i;
                                    playCard();
                                } else if (target && target.type === 'player') {
                                    G.selectedCard = i;
                                    playCard();
                                } else {
                                    showFB('请将卡牌拖到目标身上释放！', 'info');
                                }
                            }
                        } else {
                            // 单击：旧模式兼容
                            selectCard(i);
                        }
                        renderHand();
                    };

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onEnd);
                    document.addEventListener('touchmove', onMove, {passive: false});
                    document.addEventListener('touchend', onEnd);
                };

                el.addEventListener('mousedown', onStart);
                el.addEventListener('touchstart', onStart, {passive: false});
            }

            list.appendChild(el);
        });

        // btnPlay已移除，拖放出牌
    }

    // 拖放辅助函数：拖起时预高亮所有合法目标
    function showValidTargets(cardType) {
        clearDropHighlights();
        if (cardType === 'attack') {
            // 攻击牌：高亮敌人
            document.querySelectorAll('.enemy-card').forEach((el, i) => {
                if (G.enemies[i] && G.enemies[i].hp > 0) el.classList.add('drop-hint');
            });
        } else if (cardType === 'defense' || cardType === 'mobility') {
            // 防御/机动牌：只高亮自己
            document.querySelector('.player-card')?.classList.add('drop-hint');
        } else {
            // 特殊牌：敌人和自己都高亮（如淬毒对敌、饮血对自己）
            document.querySelectorAll('.enemy-card').forEach((el, i) => {
                if (G.enemies[i] && G.enemies[i].hp > 0) el.classList.add('drop-hint');
            });
            document.querySelector('.player-card')?.classList.add('drop-hint');
        }
    }

    // 精确悬停时加强高亮
    function highlightHoverTarget(x, y) {
        // 先清除 drop-target（保留 drop-hint）
        document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
        const target = getDropTarget(x, y);
        if (!target) return;
        if (target.type === 'enemy') {
            const el = document.querySelectorAll('.enemy-card')[target.idx];
            if (el) el.classList.add('drop-target');
        }
        if (target.type === 'player') {
            document.querySelector('.player-card')?.classList.add('drop-target');
        }
    }

    function highlightDropTarget(x, y, cardType) {
        highlightHoverTarget(x, y);
    }

    function clearDropHighlights() {
        document.querySelectorAll('.drop-target, .drop-hint').forEach(el => {
            el.classList.remove('drop-target');
            el.classList.remove('drop-hint');
        });
    }

    function getDropTarget(x, y) {
        const pad = 20; // 扩大检测范围
        // 检测敌人
        const enemies = document.querySelectorAll('.enemy-card');
        for (let i = 0; i < enemies.length; i++) {
            const r = enemies[i].getBoundingClientRect();
            if (x >= r.left - pad && x <= r.right + pad && y >= r.top - pad && y <= r.bottom + pad) {
                if (G.enemies[i] && G.enemies[i].hp > 0) return { type: 'enemy', idx: i };
            }
        }
        // 检测玩家（扩大区域）
        const pc = document.querySelector('.player-card');
        if (pc) {
            const r = pc.getBoundingClientRect();
            if (x >= r.left - pad && x <= r.right + pad && y >= r.top - pad && y <= r.bottom + pad) return { type: 'player' };
        }
        // 拖到敌人区域上方也算选中第一个敌人
        const enemyArea = document.querySelector('.enemy-area');
        if (enemyArea) {
            const r = enemyArea.getBoundingClientRect();
            if (y >= r.top - 30 && y <= r.bottom + 30 && x >= r.left && x <= r.right) {
                const aliveIdx = G.enemies.findIndex(e => e.hp > 0);
                if (aliveIdx >= 0) return { type: 'enemy', idx: aliveIdx };
            }
        }
        // 拖到玩家区域附近也算
        const playerArea = document.querySelector('.player-area');
        if (playerArea) {
            const r = playerArea.getBoundingClientRect();
            if (y >= r.top - 30 && y <= r.bottom + 30 && x >= r.left && x <= r.right) return { type: 'player' };
        }
        return null;
    }

    function selectEnemy(idx) {
        if (G.enemies[idx].hp <= 0) return;
        G.targetEnemy = idx;
        renderEnemies();
        renderHand();
    }

    function selectCard(idx) {
        const card = G.hand[idx];
        // 血祭免费判定
        const effectiveCost = (G.freeEpicLegend && (card.rarity === 'epic' || card.rarity === 'legend')) ? 0 : card.cost;
        if (G.energy < effectiveCost) { showFB('气力不足！', 'fail'); return; }
        
        // 攻击牌必须先选目标
        if (card.type === 'attack' && G.targetEnemy === null) {
            showFB('请先选择攻击目标！', 'info');
            return;
        }
        
        G.selectedCard = idx;
        renderHand();
    }

    // ==================== 出牌 ====================
    function playCard() {
        if (G.selectedCard === null) return;
        const card = G.hand[G.selectedCard];
        // 免费判定：血祭免费 或 醉拳闪触发（攻击牌免费）
        let effectiveCost = card.cost;
        if (G.freeEpicLegend && (card.rarity === 'epic' || card.rarity === 'legend')) {
            effectiveCost = 0;
        }
        if (G.freeNextAttack && card.type === 'attack') {
            effectiveCost = 0;
        }
        if (G.energy < effectiveCost) { showFB('气力不足！', 'fail'); return; }

        G.energy -= effectiveCost;
        if (effectiveCost === 0 && card.cost > 0) {
            if (G.freeNextAttack && card.type === 'attack') {
                G.freeNextAttack = false;
                showFB('醉拳闪触发！免费出牌！', 'special');
            } else {
                G.freeEpicLegend = false;
                showFB('血祭免费！', 'special');
            }
        }
        G.hand.splice(G.selectedCard, 1);
        G.selectedCard = null;

        // 连击计数（剑侠特色：每打出一张牌，后续攻击+2）
        G.comboCount++;

        executeCard(card);

        // 【逍遥】状态：每打出一张机动牌，储存15弹反伤害
        if (G.xiaoyaoActive && card.type === 'mobility') {
            G.xiaoyaoDmg = (G.xiaoyaoDmg || 0) + 15;
            showFB(`逍遥蓄能！弹反储存：${G.xiaoyaoDmg}`, 'special');
        }

        // 消耗词缀：不进入弃牌堆，从本局移除
        if (card.exhaust) {
            showFB(`「${card.name}」消耗！本局不再出现`, 'info');
        } else {
            G.discard.push(card.id);
        }
        renderAll();

        // 检查
        checkDead();
    }

    function executeCard(card) {
        const enemy = G.targetEnemy !== null ? G.enemies[G.targetEnemy] : null;

        // 萨满HP代价（百分比）
        if (card.hpCostPct) {
            const hpCost = Math.floor(G.player.maxHp * card.hpCostPct);
            G.player.hp -= hpCost;
            if (G.player.hp < 1) G.player.hp = 1;
            showFB(`消耗${hpCost}生命！`, 'fail');
        }
        // 萨满HP代价（固定值）
        if (card.hpCost) {
            G.player.hp -= card.hpCost;
            if (G.player.hp < 1) G.player.hp = 1;
            showFB(`消耗${card.hpCost}生命！`, 'fail');
        }

        // 蓄力buff应用
        let nextAtkMult = 1;
        if (G.nextAttackBuff > 0 && card.type === 'attack') {
            nextAtkMult = 1 + G.nextAttackBuff;
            G.nextAttackBuff = 0;
        }

        switch (card.effect) {
            // ==================== 通用 ====================
            case 'damage':
                if (enemy) dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                break;

            // ==================== 剑侠 ====================
            // 上挑：0费，8伤害，抽1张牌，回1能量
            case 'sword_shangtiao':
                if (enemy) dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                drawCards(1);
                G.energy = Math.min(G.maxEnergy, G.energy + 1);
                showFB('上挑！抽1牌+1能量', 'success');
                break;

            // 连环剑：8伤害+复制一张连环剑到弃牌堆
            case 'sword_lianhuan':
                if (enemy) dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                G.discard.push('sword_unlock_1');
                showFB('连环剑！复制一张进入弃牌堆', 'success');
                break;

            // 连斩：随机多段攻击
            case 'damage_multi_random':
                if (enemy) {
                    const hits = Math.floor(Math.random() * (card.maxHits - card.minHits + 1)) + card.minHits;
                    for (let i = 0; i < hits; i++) {
                        if (enemy.hp > 0) dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                    }
                    showFB(`连斩${hits}次！`, 'info');
                }
                break;

            // 连斩（兼容旧版）：固定多段攻击
            case 'damage_multi':
                if (enemy) {
                    for (let i = 0; i < (card.hits || 3); i++) {
                        if (enemy.hp > 0) dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                    }
                }
                break;

            // 破甲：伤害+忽视防御+破甲debuff持续3回合
            case 'damage_armor_break':
                if (enemy) {
                    dealDamage(enemy, Math.floor(card.value * nextAtkMult), 0, card.ignorePct || 0.25);
                    enemy.armorBreak = card.ignorePct || 0.25;
                    enemy.armorBreakTurns = card.breakTurns || 3;
                    showFB(`破甲！${enemy.name}防御降低${Math.floor((card.ignorePct || 0.25) * 100)}%，持续${card.breakTurns || 3}回合`, 'special');
                }
                break;

            // 破甲（兼容旧版）：忽视防御
            case 'damage_armor_ignore':
                if (enemy) dealDamage(enemy, Math.floor(card.value * nextAtkMult), 0, card.ignorePct || 0.25);
                break;

            // 蓄力：下一次攻击+100%
            case 'buff_next_attack':
                G.nextAttackBuff = (G.nextAttackBuff || 0) + (card.value || 1.0);
                showFB(`下次攻击伤害+${Math.floor(card.value * 100)}%！`, 'info');
                break;

            // 剑意：每次攻击+3（本场战斗叠加）
            case 'buff_stack_atk':
                G.stackAtk = (G.stackAtk || 0) + (card.value || 3);
                showFB(`剑意叠加！攻击永久+${card.value}（当前+${G.stackAtk}）`, 'info');
                break;

            // 暴击姿态
            case 'buff_crit':
                G.critBuff = Math.max(G.critBuff, card.value || 0.6);
                showFB(`暴击率+${Math.floor((card.value || 0.6) * 100)}%！`, 'info');
                break;

            // 剑芒：伤害+暴伤
            case 'buff_crit_damage':
                G.damageBuff = Math.max(G.damageBuff, card.value || 0.4);
                G.critDmgBonus = Math.max(G.critDmgBonus, card.critBonus || 0.5);
                showFB('剑芒！伤害与暴伤提升！', 'info');
                break;

            // 万剑归宗：6次递增伤害
            case 'damage_escalate':
                if (enemy) {
                    let esVal = card.baseValue || 5;
                    for (let i = 0; i < (card.hits || 6); i++) {
                        if (enemy.hp <= 0) break;
                        dealDamage(enemy, Math.floor(esVal * nextAtkMult));
                        esVal += (card.escalate || 3);
                    }
                }
                break;

            // 一剑倾城：35伤害暴击回满能
            case 'damage_crit_energy':
                if (enemy) {
                    const isCrit = Math.random() < (G.critBuff + (card.critPct || 0.4));
                    if (isCrit) {
                        dealDamage(enemy, Math.floor(card.value * nextAtkMult * (2 + G.critDmgBonus)), 0, 0, true);
                        G.energy = G.maxEnergy;
                        showFB('暴击！能量回满！', 'special');
                    } else {
                        dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                    }
                }
                break;

            // 独孤九剑：无视防御与闪避
            case 'damage_true':
                if (enemy) dealDamage(enemy, Math.floor(card.value * nextAtkMult), 2);
                break;

            // 天外飞仙：当前生命百分比真实伤害
            case 'damage_percent_true':
                if (enemy) {
                    const pctDmg = Math.floor(enemy.hp * (card.value || 0.5));
                    enemy.hp -= pctDmg;
                    showDmgPop(pctDmg, 'true');
                    showFB(`天外飞仙！${pctDmg}真实伤害！`, 'special');
                }
                break;

            // ==================== 刺客 ====================
            // 暗刺：潜行下×3
            case 'assassin_anchi':
                if (enemy) {
                    let dmgVal = card.value;
                    if (G.stealth > 0) {
                        dmgVal *= (card.stealthMult || 3);
                        G.stealth = 0;
                        showFB('[潜行] 暗刺伤害×3！', 'special');
                    }
                    dealDamage(enemy, Math.floor(dmgVal * nextAtkMult));
                }
                break;

            // 潜行
            case 'stealth':
                G.stealth = (G.stealth || 0) + (card.value || 1);
                G.stealthThisTurn = true;
                showFB('进入潜行！本回合不能被选中', 'info');
                break;

            // 毒刃：伤害+中毒层数
            case 'damage_poison':
                if (enemy) {
                    dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                    enemy.poison = (enemy.poison || 0) + (card.poisonStacks || 3);
                    showFB(`附加${card.poisonStacks || 3}层中毒！`, 'special');
                }
                break;

            // 绝对闪避（瞬闪：闪避成功获得潜行标记）
            case 'absolute_evade':
                G.absoluteEvade = (G.absoluteEvade || 0) + (card.value || 2);
                if (card.grantStealth) G.evadeGrantStealth = true;
                showFB(`获得${card.value || 2}次绝对闪避！`, 'info');
                break;

            // 瞬闪(新)：本回合闪避率+60%，闪避成功下回合手牌+1
            case 'evade_buff_draw':
                G.evadeBuff = (G.evadeBuff || 0) + (card.evadeBonus || 0.6);
                G.evadeBuffTurns = Math.max(G.evadeBuffTurns || 0, 1);
                G.evadeDrawPending = true;
                showFB(`闪避率+${Math.floor((card.evadeBonus || 0.6) * 100)}%！闪避成功下回合多抽1张`, 'info');
                break;

            // 淬毒：中毒层数翻倍
            case 'poison_double':
                if (enemy && enemy.poison > 0) {
                    enemy.poison *= 2;
                    showFB(`中毒翻倍！当前${enemy.poison}层`, 'special');
                } else {
                    showFB('目标未中毒！', 'fail');
                }
                break;

            // 致命：满血暴击
            case 'damage_crit_if_full':
                if (enemy) {
                    if (enemy.hp >= enemy.maxHp) {
                        dealDamage(enemy, Math.floor(card.value * nextAtkMult * (2 + G.critDmgBonus)), 0, 0, true);
                        showFB('满血暴击！', 'special');
                    } else {
                        dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                    }
                }
                break;

            // 暗杀：低血斩杀
            case 'damage_execute':
                if (enemy) {
                    if (enemy.hp / enemy.maxHp < (card.executePct || 0.3)) {
                        enemy.hp = 0;
                        showFB('斩杀！', 'special');
                    } else {
                        dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                    }
                }
                break;

            // 剧毒之牙：每层中毒额外伤害
            case 'damage_poison_scale':
                if (enemy) {
                    const bonusDmg = (enemy.poison || 0) * (card.perStack || 3);
                    dealDamage(enemy, Math.floor((card.value + bonusDmg) * nextAtkMult));
                    showFB(`中毒加成+${bonusDmg}伤害！`, 'info');
                }
                break;

            // 血刃：击杀+永久攻击
            case 'damage_kill_bonus':
                if (enemy) {
                    dealDamage(enemy, Math.floor((card.value || 12) * nextAtkMult));
                    if (enemy.hp <= 0) {
                        G.player.atk += (card.atkBonus || 2);
                        showFB(`击杀！永久攻击+${card.atkBonus || 2}`, 'special');
                    }
                }
                break;

            // 毒爆：移除中毒，每层10伤害
            case 'poison_explode':
                if (enemy) {
                    const stacks = enemy.poison || 0;
                    if (stacks > 0) {
                        const explodeDmg = stacks * (card.perStack || 10);
                        enemy.hp -= explodeDmg;
                        enemy.poison = 0;
                        showDmgPop(explodeDmg, 'poison');
                        showFB(`毒爆！${stacks}层×${card.perStack || 10}=${explodeDmg}伤害！`, 'special');
                    } else {
                        showFB('目标未中毒！', 'fail');
                    }
                }
                break;

            // 幻影杀：随机5次+潜行
            case 'phantom_strike':
                {
                    const alive = G.enemies.filter(e => e.hp > 0);
                    for (let i = 0; i < (card.hits || 5); i++) {
                        const target = alive[Math.floor(Math.random() * alive.length)];
                        if (target && target.hp > 0) {
                            dealDamage(target, Math.floor((card.value || 8) * nextAtkMult));
                        }
                        if (Math.random() < (card.stealthPct || 0.5)) {
                            G.stealth = (G.stealth || 0) + 1;
                        }
                    }
                    if (G.stealth > 0) showFB(`幻影杀！获得${G.stealth}层潜行`, 'special');
                }
                break;

            // 瘟疫之源：每回合全场+5中毒
            case 'plague_aura':
                G.plagueAura = (G.plagueAura || 0) + (card.value || 5);
                showFB(`瘟疫之源！每回合全场+${G.plagueAura}中毒`, 'special');
                break;

            // 死神标记：伤害+100%
            case 'mark_death':
                if (enemy) {
                    enemy.marked = true;
                    enemy.markMult = (card.value || 1.0);
                    enemy.markedTurns = 999;
                    showFB('死神标记！受到伤害+100%', 'special');
                }
                break;

            // ==================== 武僧 ====================
            // 铁山靠：格挡+下回合攻击
            case 'block_atk':
                G.block += (card.blockValue || 10);
                G.nextTurnAtkBonus = (G.nextTurnAtkBonus || 0) + (card.atkBonus || 5);
                showFB(`格挡+${card.blockValue || 10}！下回合攻击+${card.atkBonus || 5}`, 'info');
                break;

            // 伏魔拳：14伤害 + 获得【伏魔】状态
            case 'fumo_strike':
                if (enemy) {
                    dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                }
                G.fumoBlock = (card.fumoBlock || 5);
                G.fumoCounter = (card.fumoCounter || 15);
                showFB('伏魔拳！获得【伏魔】状态：受击抵消5+反击15', 'info');
                break;

            // 伏魔拳旧版（兼容）
            case 'damage_counter_strike':
                if (enemy) {
                    let dmg = Math.floor(card.value * nextAtkMult);
                    dealDamage(enemy, dmg);
                    if (enemy.intent && (enemy.intent === 'attack' || enemy.intent === 'heavy')) {
                        dealDamage(enemy, card.bonusDmg || 15);
                        enemy.weakened = (enemy.weakened || 0) + 2;
                        showFB(`破招！额外${card.bonusDmg || 15}伤害+虚弱2回合！`, 'special');
                    }
                }
                break;

            // 铁山靠·极：消耗护甲造成1.5倍伤害
            case 'armor_crush':
                if (enemy) {
                    const armorVal = G.block || 0;
                    const crushDmg = Math.floor(armorVal * (card.mult || 1.5));
                    G.block = 0;
                    if (crushDmg > 0) {
                        dealDamage(enemy, crushDmg);
                        showFB(`铁山靠·极！${armorVal}护甲转化为${crushDmg}伤害！`, 'special');
                    } else {
                        showFB('没有护甲可转化！', 'info');
                    }
                }
                break;

            // 醉拳闪：闪避+60%，成功手牌+1，失败能量+1
            case 'monk_drunk_evade':
                G.evadeBuff = (G.evadeBuff || 0) + (card.evadeBonus || 0.6);
                G.evadeBuffTurns = Math.max(G.evadeBuffTurns || 0, 1);
                G.monkDrunkEvade = true;
                showFB('醉拳闪！闪避+60%，成功手牌+1/失败能量+1', 'info');
                break;

            // 醉拳闪旧版（兼容）
            case 'evade_free_attack':
                G.absoluteEvade = (G.absoluteEvade || 0) + 1;
                G.freeAttackOnDodge = true;
                showFB('醉拳闪！获得1次闪避，闪避后下张攻击免费', 'info');
                break;

            // 无相转：抵消下次伤害并反弹
            case 'absorb_redirect':
                G.absorbRedirect = true;
                showFB('无相转！抵消下次伤害并转移', 'special');
                break;

            // 震天掌：当前拥有闪避状态则翻倍+回1能量
            case 'damage_if_dodged':
                if (enemy) {
                    const hasEvade = (G.absoluteEvade > 0 || G.evadeBuff > 0 || G.evadeOverTime > 0);
                    const mult = hasEvade ? 2 : 1;
                    dealDamage(enemy, Math.floor(card.value * mult * nextAtkMult));
                    if (mult === 2) {
                        G.energy = Math.min(G.maxEnergy, G.energy + 1);
                        showFB('闪避状态触发！伤害翻倍+1能量！', 'special');
                    }
                }
                break;

            // 震天掌旧版（兼容）
            case 'damage_if_unhurt':
                if (enemy) {
                    const mult = G.hurtThisTurn ? 1 : 2;
                    dealDamage(enemy, Math.floor(card.value * mult * nextAtkMult));
                    if (mult === 2) showFB('未受伤！伤害翻倍！', 'special');
                }
                break;

            // 铁布衫：护甲不消失
            case 'armor_persist':
                G.block += (card.value || 25);
                G.blockPersist = true;
                showFB(`护甲+${card.value || 25}（不消失）！`, 'info');
                break;

            // 凌波微步：3回合每回合+1闪避
            case 'evade_over_time':
                G.evadeOverTime = (card.turns || 3);
                showFB(`凌波微步！${card.turns || 3}回合每回合+1闪避`, 'info');
                break;

            // 雾身：丢弃手牌+能量
            case 'discard_all_energy':
                G.discard.push(...G.hand.map(c => c.id));
                G.hand = [];
                G.nextTurnEnergyBonus = (G.nextTurnEnergyBonus || 0) + (card.energyBonus || 2);
                showFB(`雾身！下回合能量+${card.energyBonus || 2}`, 'special');
                break;

            // 金刚不坏：无敌+下回合归零
            case 'invincible_penalty':
                G.immune = true;
                G.energyPenaltyNextTurn = true;
                showFB('金刚不坏！本回合无敌，下回合能量归零', 'special');
                break;

            // 幻影迷踪：自动反击
            case 'auto_counter':
                G.autoCounter = (card.value || 15);
                G.autoCounterTurns = (card.turns || 2);
                showFB(`幻影迷踪！受击反击${card.value}伤害，持续${card.turns}回合`, 'special');
                break;

            // 天地同寿：X费，消耗所有能量，单体X×20伤害
            case 'energy_burst':
                {
                    const totalEnergy = G.energy;
                    const burstDmg = totalEnergy * (card.perEnergy || 20);
                    G.energy = 0;
                    if (burstDmg > 0 && enemy) {
                        enemy.hp -= burstDmg;
                        showDmgPop(burstDmg, 'special');
                        showFB(`天地同寿！消耗${totalEnergy}气，${burstDmg}伤害！`, 'special');
                    } else if (!enemy) {
                        showFB('需要选择目标！', 'fail');
                    } else {
                        showFB('没有能量！天地同寿无效！', 'fail');
                    }
                }
                break;

            // 逍遥游：获得永久【逍遥】状态
            case 'xiaoyao_state':
                G.xiaoyaoActive = true;
                G.xiaoyaoDmg = G.xiaoyaoDmg || 0;
                showFB('逍遥游！获得【逍遥】：机动牌蓄能，受击释放弹反！', 'special');
                break;

            // 逍遥游旧版（兼容）
            case 'foresight':
                G.absoluteEvade = (G.absoluteEvade || 0) + (card.value || 3);
                showFB(`预知！必然避开下${card.value || 3}次攻击`, 'special');
                break;

            // ==================== 萨满 ====================
            // 真气掌：伤害+回血
            case 'damage_heal':
                if (enemy) dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                {
                    const healAmt = Math.min(card.heal || 5, G.player.maxHp - G.player.hp);
                    G.player.hp += healAmt;
                    if (healAmt > 0) showFB(`回复${healAmt}生命！`, 'success');
                }
                break;

            // 噬魂击：击杀回血
            case 'damage_kill_heal':
                if (enemy) {
                    dealDamage(enemy, Math.floor(card.value * nextAtkMult));
                    if (enemy.hp <= 0) {
                        const healAmt = Math.floor(G.player.maxHp * (card.healPct || 0.2));
                        G.player.hp = Math.min(G.player.maxHp, G.player.hp + healAmt);
                        showFB(`击杀回复${healAmt}生命！`, 'success');
                    }
                }
                break;

            // 治疗
            case 'heal':
                {
                    const healVal = Math.min(card.value || 20, G.player.maxHp - G.player.hp);
                    G.player.hp += healVal;
                    showFB(`恢复${healVal}生命！`, 'success');
                }
                break;

            // 护盾
            case 'shield':
                G.shield += (card.value || 30);
                showFB(`护盾+${card.value || 30}！`, 'info');
                break;

            // 饮血阵：本回合伤害50%转治疗（可叠加）
            case 'lifesteal_this_turn':
                G.lifestealThisTurn = (G.lifestealThisTurn || 0) + (card.lifesteal || 0.5);
                showFB(`饮血阵！本回合吸血${Math.floor(G.lifestealThisTurn * 100)}%`, 'special');
                break;

            // 血祭：消耗生命换能量+抽牌（萨满核心发动机）
            case 'blood_sacrifice_engine':
                G.player.hp -= (card.hpCost || 8);
                if (G.player.hp < 1) G.player.hp = 1;
                G.energy = Math.min(G.maxEnergy, G.energy + (card.energyGain || 2));
                drawCards(1);
                showFB(`血祭！-${card.hpCost || 8}血，+${card.energyGain || 2}能量，抽1张`, 'special');
                break;

            // 血祭免费（旧版兼容）
            case 'blood_discount':
                G.freeEpicLegend = true;
                showFB('血祭！下张史诗/传说牌免费', 'special');
                break;

            // 燃血：+攻击力
            case 'sacrifice_buff_atk':
                G.damageBuff += (card.value || 15) / G.player.atk;
                showFB(`燃血！本回合攻击+${card.value || 15}`, 'special');
                break;

            // 自爆：已损失生命200%全场伤害
            case 'sacrifice_lost_hp_aoe':
                {
                    const lostHp = G.player.maxHp - G.player.hp;
                    const aoeDmg = Math.floor(lostHp * (card.mult || 2.0));
                    G.enemies.filter(e => e.hp > 0).forEach(e => {
                        e.hp -= aoeDmg;
                        showDmgPop(aoeDmg, 'special');
                    });
                    showFB(`自爆！${aoeDmg}全场伤害！`, 'special');
                }
                break;

            // 荆棘护盾
            case 'thorns_shield':
                G.shield += (card.shield || 20);
                G.thorns = Math.max(G.thorns, card.thorns || 20);
                showFB(`荆棘护盾！${card.shield}盾+${card.thorns}反伤`, 'special');
                break;

            // 煞斩：残血加成，30%血线以下翻倍
            case 'damage_lowhp_scale':
                if (enemy) {
                    const hpRatio = G.player.hp / G.player.maxHp;
                    const missingPct = Math.floor((1 - hpRatio) * 10);
                    let bonusDmg = missingPct * (card.perTenPct || 8);
                    // 30%血线以下，加成翻倍
                    if (hpRatio <= 0.3) bonusDmg *= 2;
                    const totalDmg = Math.floor((card.value + bonusDmg) * nextAtkMult);
                    dealDamage(enemy, totalDmg);
                    if (bonusDmg > 0) showFB(`残血爆发！+${bonusDmg}伤害${hpRatio <= 0.3 ? '（翻倍！）' : ''}`, 'special');
                }
                break;

            // 血祭·噬：全场伤害+重伤
            case 'sacrifice_aoe_wound':
                G.enemies.filter(e => e.hp > 0).forEach(e => {
                    e.hp -= card.value || 40;
                    e.wounded = true;
                    e.woundedTurns = 3;
                    showDmgPop(card.value || 40, 'special');
                });
                showFB('血祭·噬！全场重伤！', 'special');
                break;

            // 爆甲：消耗所有护盾，全场造成等量伤害
            case 'shield_explode':
                {
                    const shieldVal = G.shield || 0;
                    if (shieldVal > 0) {
                        G.shield = 0;
                        G.enemies.filter(en => en.hp > 0).forEach(en => {
                            en.hp -= shieldVal;
                            showDmgPop(shieldVal, 'special');
                        });
                        showFB(`爆甲！消耗${shieldVal}护盾，全场${shieldVal}伤害！`, 'special');
                    } else {
                        showFB('没有护盾！爆甲无效！', 'fail');
                    }
                }
                break;

            // 血魔大法：吸血5回合
            case 'blood_demon_lifesteal':
                G.lifestealTurns = (card.turns || 5);
                G.lifestealPct = (card.lifesteal || 0.5);
                showFB(`血魔大法！${card.turns}回合内伤害50%转治疗`, 'special');
                break;

            // 不死之身：3回合不死+回血
            case 'immortal_regen':
                if (G.immortalUsedThisRun) {
                    showFB('不死蛊本局已使用过！', 'fail');
                    break;
                }
                G.immortalRegenTurns = (card.turns || 3);
                G.immortalRegenPct = (card.regenPct || 0.1);
                G.immortalTriggered = false;
                G.immortalUsedThisRun = true;
                showFB(`不死之身！${card.turns}回合不死+每回合回复10%`, 'special');
                break;

            default:
                console.warn('[executeCard] 未实现的效果:', card.effect);
                break;
        }

        // 记录上一张牌类型（用于连招判定）
        G.lastCardType = card.type;
    }

    function dealDamage(enemy, baseDmg, mode = 0, ignoreDefPct = 0, forceCrit = false) {
        if (!enemy || enemy.hp <= 0) return 0;

        // 闪避判定（所有有evadeRate的敌人都可能闪避，mode=2无视闪避）
        if (mode === 0 && !forceCrit && enemy.evadeRate > 0 && Math.random() < enemy.evadeRate) {
            showDmgPop(0, 'miss');
            return 0;
        }

        let dmg = baseDmg;
        // 连击加成（剑侠特色：本回合每打出一张牌+2伤害）
        if (G.player && G.player.class === 'sword' && G.comboCount > 1) {
            dmg += (G.comboCount - 1) * 2;
        }
        // 攻击增益
        const atkBonus = G.damageBuff + (G.stackAtk || 0) / 20;
        dmg = Math.floor(dmg * (1 + atkBonus));
        // 剑意叠加加成
        dmg += (G.stackAtk || 0);
        // 忽视防御（mode=2完全无视）
        if (mode !== 2) {
            // 破甲debuff：叠加忽视防御比例
            const totalIgnore = Math.min(1, ignoreDefPct + (enemy.armorBreak || 0));
            const defReduction = enemy.def * (1 - totalIgnore);
            dmg = Math.floor(dmg * (1 - defReduction / (defReduction + 30)));
        }
        // 标记增伤（死神标记）
        if (enemy.marked) dmg = Math.floor(dmg * (1 + (enemy.markMult || 1.0)));
        // 重伤增伤
        if (enemy.wounded) dmg = Math.floor(dmg * 1.3);
        // 暴击
        const critRate = 0.1 + G.critBuff;
        const isCrit = forceCrit || Math.random() < critRate;
        if (isCrit) {
            dmg = Math.floor(dmg * (2 + G.critDmgBonus));
            showDmgPop(dmg, 'crit');
        } else {
            showDmgPop(dmg, 'dmg');
        }

        enemy.hp -= dmg;

        // 吸血（血魔大法 - 持续回合）
        if (G.lifestealTurns > 0 && G.lifestealPct > 0) {
            const ls = Math.floor(dmg * G.lifestealPct);
            G.player.hp = Math.min(G.player.maxHp, G.player.hp + ls);
        }
        // 饮血阵（本回合吸血）
        if (G.lifestealThisTurn > 0) {
            const ls = Math.floor(dmg * G.lifestealThisTurn);
            G.player.hp = Math.min(G.player.maxHp, G.player.hp + ls);
        }

        return dmg;
    }

    function showDmgPop(amt, type) {
        const enemyCards = document.querySelectorAll('.enemy-card:not(.dead)');
        if (enemyCards.length === 0) return;
        const targetCard = enemyCards[G.targetEnemy !== null && G.enemies[G.targetEnemy]?.hp > 0 ? G.targetEnemy : 0];
        if (!targetCard) return;

        const pop = document.createElement('div');
        pop.className = `dmg-pop ${type}`;
        pop.textContent = type === 'miss' ? '闪避' : type === 'crit' ? `${amt}!` : type === 'reflect' ? `刺${amt}` : `-${amt}`;
        pop.style.left = '60%'; pop.style.top = '30%';
        pop.style.transform = 'translateX(-50%)';
        targetCard.style.position = 'relative';
        targetCard.appendChild(pop);
        setTimeout(() => pop.remove(), 800);
    }

    function checkDead() {
        // 敌人死亡
        const dead = G.enemies.filter(e => e.hp <= 0);
        G.enemies = G.enemies.filter(e => e.hp > 0);
        dead.forEach(e => {
            G.gold += e.gold;
            showFB(`击杀${e.name}！+${e.gold}银`, 'success');
        });

        G.targetEnemy = G.enemies.length > 0 ? G.enemies.findIndex(e => e.hp > 0) : null;

        // 检查战斗结束（所有敌人死亡）
        if (G.enemies.length === 0) {
            // 战斗胜利：将手牌和弃牌全部回收入牌组
            G.discard.push(...G.hand.map(c => c.id));
            G.hand = [];
            G.energy = CLASSES[G.player.class].energy;
            G.turn = 1;
            G.targetEnemy = null;
            G.selectedCard = null;
            resetBattleState();
            renderAll();
            setTimeout(() => endChapter(), 300);
            return;
        }

        // 检查玩家死亡
        if (G.player.hp <= 0) {
            G.player.hp = 0;
            endRun(false);
            return;
        }

        renderAll();
    }

    function useHeal() {
        if (G.healPots <= 0) { showFB('没有丹药！', 'fail'); return; }
        G.healPots--;
        const heal = Math.min(50, G.player.maxHp - G.player.hp);
        G.player.hp = Math.min(G.player.maxHp, G.player.hp + 50);
        showFB(`丹药！+${heal}血`, 'success');
        renderAll();
    }

    function endTurn() {
        // ========== 回合结束：清空本回合临时增益 ==========
        G.damageBuff = 0;
        G.critBuff = 0;
        G.critDmgBonus = 0;
        G.revengeAll = false;
        G.stealthThisTurn = false;
        G.freeEpicLegend = false;
        G.lastCardType = null;
        G.hurtThisTurn = false;
        G.dodgedThisTurn = false;
        G.comboCount = 0;
        G.evadeGrantStealth = false;
        G.lifestealThisTurn = 0;
        G.evadeDrawPending = false;
        G.monkDrunkEvade = false;

        // 闪避回合递减
        if (G.evadeBuffTurns > 0) {
            G.evadeBuffTurns--;
            if (G.evadeBuffTurns <= 0) G.evadeBuff = 0;
        }

        // 瘟疫之源：全场+中毒
        if (G.plagueAura > 0) {
            G.enemies.filter(e => e.hp > 0).forEach(e => {
                e.poison = (e.poison || 0) + G.plagueAura;
            });
            showFB(`瘟疫扩散！全场+${G.plagueAura}中毒`, 'special');
        }

        // 中毒结算
        G.enemies.forEach(e => {
            if (e.hp > 0 && e.poison > 0) {
                e.hp -= e.poison;
                if (e.hp < 0) e.hp = 0;
                showFB(`${e.name}中毒-${e.poison}！`, 'special');
            }
            // 重伤回合递减
            if (e.wounded && e.woundedTurns > 0) {
                e.woundedTurns--;
                if (e.woundedTurns <= 0) e.wounded = false;
            }
            // 破甲回合递减
            if (e.armorBreakTurns > 0) {
                e.armorBreakTurns--;
                if (e.armorBreakTurns <= 0) { e.armorBreak = 0; showFB(`${e.name}破甲效果消失`, 'info'); }
            }
        });

        // 中毒/debuff可能杀死敌人，检查一次
        checkDead();
        if (G.enemies.length === 0) return;

        // 不死之身回血
        if (G.immortalRegenTurns > 0) {
            const regenAmt = Math.floor(G.player.maxHp * G.immortalRegenPct);
            G.player.hp = Math.min(G.player.maxHp, G.player.hp + regenAmt);
            G.immortalRegenTurns--;
            showFB(`不死回复+${regenAmt}！`, 'success');
            if (G.immortalRegenTurns <= 0) {
                G.immortalTriggered = true; // 保护结束
            }
        }

        // 吸血回合递减
        if (G.lifestealTurns > 0) G.lifestealTurns--;

        // 自动反击回合递减
        if (G.autoCounterTurns > 0) G.autoCounterTurns--;
        if (G.autoCounterTurns <= 0) G.autoCounter = 0;

        // ========== 敌人攻击阶段 ==========
        G.enemies.filter(e => e.hp > 0).forEach(e => {
            // 潜行：敌人不能选中玩家
            if (G.stealth > 0) {
                showFB(`潜行中！${e.name}找不到你`, 'info');
                return;
            }

            // 绝对闪避（瞬闪/预知）
            if (G.absoluteEvade > 0) {
                G.absoluteEvade--;
                G.dodgedThisTurn = true;
                showFB(`绝对闪避！避开${e.name}攻击`, 'success');
                // 瞬闪特效：闪避成功获得潜行
                if (G.evadeGrantStealth) {
                    G.stealth = (G.stealth || 0) + 1;
                    showFB('闪避成功！获得1层潜行', 'info');
                }
                // 闪避成功：下回合多抽1张
                if (G.evadeDrawPending) {
                    G.nextTurnDrawBonus = (G.nextTurnDrawBonus || 0) + 1;
                    showFB('闪避成功！下回合手牌+1', 'info');
                }
                // 醉拳闪：闪避成功下张攻击免费
                if (G.freeAttackOnDodge) {
                    G.freeNextAttack = true;
                    G.freeAttackOnDodge = false;
                    showFB('醉拳闪触发！下张攻击牌免费！', 'special');
                }
                return;
            }

            // 普通闪避判定
            const totalEvade = G.player.evade + G.evadeBuff;
            if (Math.random() < totalEvade) {
                showFB(`闪避${e.name}攻击！`, 'success');
                G.dodgedThisTurn = true;
                // 闪避成功：下回合多抽1张
                if (G.evadeDrawPending) {
                    G.nextTurnDrawBonus = (G.nextTurnDrawBonus || 0) + 1;
                    showFB('闪避成功！下回合手牌+1', 'info');
                }
                // 醉拳闪(新)：闪避成功下回合手牌+1
                if (G.monkDrunkEvade) {
                    G.nextTurnDrawBonus = (G.nextTurnDrawBonus || 0) + 1;
                    showFB('醉拳闪！闪避成功，下回合手牌+1', 'special');
                }
                // 醉拳闪旧版：闪避成功下张攻击免费
                if (G.freeAttackOnDodge) {
                    G.freeNextAttack = true;
                    G.freeAttackOnDodge = false;
                    showFB('醉拳闪触发！下张攻击牌免费！', 'special');
                }
                return;
            }

            // 醉拳闪(新)：闪避失败能量+1
            if (G.monkDrunkEvade) {
                G.energy = Math.min(G.maxEnergy, G.energy + 1);
                showFB('醉拳闪！闪避失败，能量+1', 'info');
            }

            // 免疫
            if (G.immune) {
                G.immune = false;
                showFB('免疫伤害！', 'special');
                return;
            }

            // 无相转：抵消伤害并反弹
            if (G.absorbRedirect) {
                G.absorbRedirect = false;
                const redirectDmg = Math.floor(e.atk * (1 - G.player.def / (G.player.def + 30)));
                const alive = G.enemies.filter(en => en.hp > 0 && en !== e);
                const target = alive.length > 0 ? alive[Math.floor(Math.random() * alive.length)] : e;
                target.hp -= redirectDmg;
                showFB(`无相转！${redirectDmg}伤害转移给${target.name}`, 'special');
                return;
            }

            let dmg = Math.floor(e.atk * (1 - G.player.def / (G.player.def + 30)));

            // 虚弱减伤（虚弱敌人伤害-30%）
            if (e.weakened && e.weakened > 0) {
                dmg = Math.floor(dmg * 0.7);
                e.weakened--;
            }

            // 格挡
            if (G.block > 0) {
                const blockAbsorb = Math.min(G.block, dmg);
                G.block -= blockAbsorb;
                dmg -= blockAbsorb;
                if (blockAbsorb > 0) showFB(`格挡${blockAbsorb}伤害！`, 'info');
                if (dmg <= 0) {
                    // 自动反击
                    if (G.autoCounter > 0) { e.hp -= G.autoCounter; showFB(`反击${e.name}！-${G.autoCounter}`, 'special'); }
                    return;
                }
            }

            // 护盾
            if (G.shield > 0) {
                const absorb = Math.min(G.shield, dmg);
                G.shield -= absorb;
                dmg -= absorb;
                // 护盾碎时爆炸
                if (G.shield <= 0 && G.shieldExplode) {
                    const explodeDmg = absorb;
                    G.enemies.filter(en => en.hp > 0).forEach(en => {
                        en.hp -= explodeDmg;
                    });
                    G.shieldExplode = false;
                    showFB(`护盾碎裂！全场${explodeDmg}爆炸伤害！`, 'special');
                }
                // 荆棘反伤
                if (G.thorns > 0) {
                    e.hp -= G.thorns;
                    showFB(`荆棘反伤${G.thorns}！`, 'special');
                }
                if (dmg <= 0) return;
            }

            // 不死之身保护
            if (G.player.hp - dmg <= 0 && G.immortalTriggered === false) {
                G.player.hp = 1;
                G.immortalTriggered = true;
                showFB('不死之身触发！保命！', 'special');
                return;
            }

            // 反伤震（受击返还100%）
            if (G.counterReflect > 0) {
                const reflectDmg = Math.floor(dmg * G.counterReflect);
                e.hp -= reflectDmg;
                G.counterReflect = 0;
                showFB(`反震！返还${reflectDmg}伤害！`, 'special');
            }

            // 自动反击
            if (G.autoCounter > 0) {
                e.hp -= G.autoCounter;
                showFB(`幻影反击${e.name}！-${G.autoCounter}`, 'special');
            }

            // 【伏魔】状态：抵消伤害+反击
            if (G.fumoBlock > 0 || G.fumoCounter > 0) {
                const fumoAbsorb = Math.min(G.fumoBlock || 0, dmg);
                dmg -= fumoAbsorb;
                if (G.fumoCounter > 0) {
                    e.hp -= G.fumoCounter;
                    showFB(`伏魔反击！抵消${fumoAbsorb}伤害，反击${G.fumoCounter}！`, 'special');
                }
                G.fumoBlock = 0;
                G.fumoCounter = 0;
                if (dmg <= 0) return;
            }

            // 【逍遥】弹反：受击时释放所有储存伤害
            if (G.xiaoyaoActive && G.xiaoyaoDmg > 0) {
                e.hp -= G.xiaoyaoDmg;
                showFB(`逍遥弹反！释放${G.xiaoyaoDmg}点伤害！`, 'special');
                G.xiaoyaoDmg = 0;
            }

            G.hurtThisTurn = true;
            G.player.hp -= dmg;
            if (G.player.hp <= 0) G.player.hp = 0;
            showFB(`${e.name}攻击！-${dmg}血`, 'fail');
        });

        // 敌人攻击后立即检查死亡
        if (G.player.hp <= 0) {
            renderAll();
            endRun(false);
            return;
        }

        // 潜行消耗
        if (G.stealth > 0) G.stealth--;

        // 敌人攻击结束后清除闪避相关临时状态
        G.freeAttackOnDodge = false;

        // 弃牌（保留有retain词缀的牌）
        const retainCards = G.hand.filter(c => c.retain);
        const discardCards = G.hand.filter(c => !c.retain);
        G.discard.push(...discardCards.map(c => c.id));
        G.hand = retainCards; // 保留牌留在手中

        // ========== 新回合开始 ==========
        G.turn++;

        // 能量惩罚（金刚不坏后遗症）
        if (G.energyPenaltyNextTurn) {
            G.energy = 0;
            G.energyPenaltyNextTurn = false;
        } else {
            // 能量恢复制：每回合恢复energyRegen点，不超过maxEnergy
            const bonusEnergy = G.nextTurnEnergyBonus || 0;
            G.energy = Math.min(G.maxEnergy, G.energy + G.energyRegen + bonusEnergy);
            G.nextTurnEnergyBonus = 0;
        }

        // 下回合攻击加成（铁山靠）
        if (G.nextTurnAtkBonus > 0) {
            G.damageBuff = G.nextTurnAtkBonus / G.player.atk;
            G.nextTurnAtkBonus = 0;
        }

        // 格挡不保留（除非铁布衫）
        if (!G.blockPersist) {
            G.block = 0;
        }
        G.blockPersist = false;

        // 凌波微步：每回合+1绝对闪避
        if (G.evadeOverTime > 0) {
            G.absoluteEvade = (G.absoluteEvade || 0) + 1;
            G.evadeOverTime--;
            showFB('凌波微步！+1闪避', 'info');
        }

        G.targetEnemy = null;

        // 抽牌（每回合固定抽5张 + 额外抽牌奖励）
        const bonusDraw = G.nextTurnDrawBonus || 0;
        G.nextTurnDrawBonus = 0;
        drawCards(5 + bonusDraw);
        if (bonusDraw > 0) showFB(`闪避奖励！额外抽${bonusDraw}张`, 'info');

        // 死亡检查
        if (G.player.hp <= 0) { G.player.hp = 0; endRun(false); }

        renderAll();
    }

    function endChapter() {
        G.permanent.bestChapter = Math.max(G.permanent.bestChapter, G.chapter);
        if (G.chapter >= G.maxChapter) {
            G.permanent.wins++;
            showModal('🏆', '通关成功！', `恭喜带领「${G.player.name}」通关全部章节！\n💰 获得银两：${G.gold}`, [
                { name: '再来一局', effect: () => { hideModal(); showScreen('screenMain'); updateMain(); }}
            ]);
        } else {
            showModal('📜', '章节完成', `「${G.player.name}」完成了第${G.chapter}章！\n💰 银两：${G.gold}`, [
                { name: '继续下一章', effect: () => { hideModal(); nextChapter(); }},
                { name: '返回', effect: () => { hideModal(); showScreen('screenMain'); updateMain(); }}
            ]);
        }
        saveData();
    }

    function nextChapter() {
        G.chapter++;
        G.wave = 1;
        G.turn = 1;
        G.gold += 50; // 章节奖励
        // 血量继承，不回满（只回复20%作为章节奖励）
        const chapterHeal = Math.floor(G.player.maxHp * 0.2);
        G.player.hp = Math.min(G.player.maxHp, G.player.hp + chapterHeal);
        resetBattleState();
        // 选卡
        showCardPick();
    }

    function showCardPick() {
        const cls = CLASSES[G.player.class];
        const pool = cls.unlockPool.filter(id => !(G.permanent.unlockedCards || []).includes(id));
        if (pool.length === 0) {
            G.gold += 80;
            showFB('无新卡可解锁，+80银', 'info');
            startNextChapter();
            return;
        }

        // 选3张
        const picks = [];
        const temp = [...pool];
        for (let i = 0; i < 3 && temp.length > 0; i++) {
            const idx = Math.floor(Math.random() * temp.length);
            picks.push(temp.splice(idx, 1)[0]);
        }

        const container = document.getElementById('pickCards');
        container.innerHTML = '';
        picks.forEach(id => {
            const card = ALL_CARDS[id];
            const rarityClass = card.rarity === 'legend' ? 'legend' : card.rarity === 'epic' ? 'epic' : 'rare';
            const keywords = [];
            if (card.exhaust) keywords.push('消耗');
            if (card.retain) keywords.push('保留');
            if (card.innate) keywords.push('固有');
            const kwStr = keywords.length ? `<div class="pick-card-kw">[${keywords.join('/')}]</div>` : '';
            container.innerHTML += `
                <div class="pick-card" onclick="pickCard('${id}')">
                    <div class="pick-card-icon">${card.icon}</div>
                    <div class="pick-card-name">${card.name}</div>
                    <div class="pick-card-type">${card.cost}费 · ${card.type === 'attack' ? '攻击' : card.type === 'defense' ? '防御' : card.type === 'mobility' ? '机动' : '特殊'}</div>
                    <div class="pick-card-effect">${card.desc}</div>
                    ${kwStr}
                    <div><span class="pick-card-rarity ${rarityClass}">${card.rarity === 'legend' ? '传说' : card.rarity === 'epic' ? '史诗' : '稀有'}</span></div>
                </div>
            `;
        });
        container.innerHTML += `
            <div class="pick-card skip-card" onclick="skipCardPick()">
                <div class="pick-card-icon" style="font-size:30px;opacity:0.5;">✕</div>
                <div class="pick-card-name" style="color:var(--ink-dim);">跳过</div>
                <div class="pick-card-effect">不拿牌<br>保持牌组纯净</div>
            </div>
        `;

        document.getElementById('cardPick').style.display = 'flex';
    }

    function skipCardPick() {
        document.getElementById('cardPick').style.display = 'none';
        showFB('跳过选卡，保持牌组纯净', 'info');
        startNextChapter();
    }

    function pickCard(id) {
        G.permanent.unlockedCards = [...(G.permanent.unlockedCards || []), id];
        saveData();
        document.getElementById('cardPick').style.display = 'none';
        const card = ALL_CARDS[id];
        showFB(`获得「${card.name}」！永久解锁`, 'success');
        // 通过startNextChapter将新卡加入手牌（不再重复push到deck）
        startNextChapter(id);
    }

    function startNextChapter(newCardId) {
        G.wave = 1;
        G.turn = 1;
        G.energy = CLASSES[G.player.class].energy;
        resetBattleState();
        // 更新战斗背景
        const battleBg = `assets/backgrounds/battle/battle scene_${G.chapter}.jpeg`;
        document.getElementById('screenBattle').style.backgroundImage = `url('${battleBg}')`;
        // 收集所有卡牌ID，统一转为对象重建牌组
        const allIds = [
            ...G.deck.map(c => typeof c === 'string' ? c : c.id),
            ...G.hand.map(c => c.id),
            ...G.discard
        ];
        // 如果有新卡且不在当前牌组中，加入牌组
        if (newCardId && !allIds.includes(newCardId)) {
            allIds.push(newCardId);
        }
        G.deck = allIds.filter(id => ALL_CARDS[id]).map(id => ({...ALL_CARDS[id]}));
        G.hand = []; G.discard = [];
        shuffle(G.deck);
        drawCards(5);
        spawnEnemies();
        renderAll();
        showWaveBanner(`章节 ${G.chapter}`);
        if (Math.random() < 0.4) setTimeout(() => triggerEvent(), 500);
    }

    function endRun(victory) {
        if (victory) {
            G.permanent.wins++;
        }
        saveData();
        // 清空牌堆状态，防止下一局残留
        G.deck = []; G.hand = []; G.discard = [];
        G.enemies = [];
        G.selectedCard = null;
        G.targetEnemy = null;
        showModal(victory ? '🏆' : '💀', victory ? '通关成功！' : '阵亡', `「${G.player.name}」倒下...\n💰 银两：${G.gold}`, [
            { name: '再来一局', effect: () => { hideModal(); showScreen('screenMain'); updateMain(); }}
        ]);
    }

    // ==================== 事件 ====================
    function triggerEvent() {
        const ev = EVENTS[Math.floor(Math.random() * EVENTS.length)];
        showModal(ev.icon, ev.title, ev.desc, ev.choices);
    }

    function showModal(icon, title, desc, choices) {
        document.getElementById('mIcon').textContent = icon;
        document.getElementById('mTitle').textContent = title;
        document.getElementById('mDesc').textContent = desc;
        const cEl = document.getElementById('mChoices');
        cEl.innerHTML = '';
        choices.forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'choice-btn';
            btn.innerHTML = `
                <div class="choice-name">${c.name}</div>
                <div class="choice-desc">${c.desc || ''}</div>
                ${c.cost ? `<div class="choice-cost">${c.cost > 0 ? `消耗 ${c.cost} 银两` : `消耗 ${Math.abs(c.cost)} 银两 + 奖励`}</div>` : ''}
            `;
            btn.onclick = () => {
                if (c.cost > 0 && G.gold < c.cost) { showFB('银两不足！', 'fail'); return; }
                c.effect(G);
                hideModal();
                renderAll();
            };
            cEl.appendChild(btn);
        });
        document.getElementById('modal').style.display = 'flex';
    }

    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    function showWaveBanner(text) {
        const b = document.createElement('div');
        b.className = 'wave-banner';
        b.textContent = text;
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 1500);
    }

    function showFB(text, type) {
        const el = document.getElementById('feedback');
        el.innerHTML = `<div class="fb-text ${type}">${text}</div>`;
        setTimeout(() => { if (el) el.innerHTML = ''; }, 2200);
    }

    // ==================== GM 指令 ====================
    document.addEventListener('keydown', (e) => {
        // K = 秒杀所有敌人
        if (e.key === 'k' || e.key === 'K') {
            G.enemies.forEach(en => { en.hp = 0; });
            showFB('GM: 秒杀全部敌人', 'special');
            renderAll(); checkDead();
        }
        // E = 能量拉满
        if (e.key === 'e' || e.key === 'E') {
            G.energy = G.maxEnergy;
            showFB('GM: 能量拉满', 'info');
            renderAll();
        }
        // H = 回满血
        if (e.key === 'h' || e.key === 'H') {
            if (G.player) { G.player.hp = G.player.maxHp; }
            showFB('GM: 回满血', 'success');
            renderAll();
        }
        // N = 直接跳下一章
        if (e.key === 'n' || e.key === 'N') {
            G.enemies.forEach(en => { en.hp = 0; });
            showFB('GM: 跳至下一章', 'special');
            renderAll(); checkDead();
        }
    });

    // ==================== 牌堆查看器 ====================
    let _currentPileTab = 'deck';

    function openPileViewer(tab) {
        _currentPileTab = tab || 'deck';
        renderPileViewer();
        document.getElementById('pileViewer').style.display = 'flex';
    }

    function closePileViewer() {
        document.getElementById('pileViewer').style.display = 'none';
    }

    function switchPileTab(tab) {
        _currentPileTab = tab;
        document.querySelectorAll('.pile-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderPileViewer();
    }

    function renderPileViewer() {
        const body = document.getElementById('pileViewerBody');
        let cards = [];

        if (_currentPileTab === 'deck') {
            // 全牌组：抽牌堆+手牌+弃牌堆的所有卡
            const allIds = [
                ...G.deck.map(c => typeof c === 'string' ? c : c.id),
                ...G.hand.map(c => c.id),
                ...G.discard
            ];
            cards = allIds.map(id => ALL_CARDS[id]).filter(Boolean);
        } else if (_currentPileTab === 'draw') {
            cards = G.deck.map(c => typeof c === 'string' ? ALL_CARDS[c] : ALL_CARDS[c.id] || c).filter(Boolean);
        } else if (_currentPileTab === 'discard') {
            cards = G.discard.map(id => ALL_CARDS[id]).filter(Boolean);
        }

        if (cards.length === 0) {
            body.innerHTML = '<div class="pile-viewer-empty">空</div>';
            return;
        }

        // 按类型排序：攻击 > 防御 > 机动 > 特殊
        const typeOrder = { attack: 0, defense: 1, mobility: 2, special: 3 };
        cards.sort((a, b) => (typeOrder[a.type] || 99) - (typeOrder[b.type] || 99));

        body.innerHTML = cards.map(card => {
            const rarityDot = card.rarity === 'legend' ? '◆' : card.rarity === 'epic' ? '◇' : card.rarity === 'rare' ? '○' : '';
            return `
                <div class="pile-card ${card.type}">
                    ${rarityDot ? `<div class="pile-card-rarity ${card.rarity}">${rarityDot}</div>` : ''}
                    <div class="pile-card-cost">⚡${card.cost}</div>
                    <div class="pile-card-icon">${card.icon}</div>
                    <div class="pile-card-name">${card.name}</div>
                    <div class="pile-card-desc">${card.desc}</div>
                </div>
            `;
        }).join('');
    }

    // ==================== 卡牌长按预览系统 ====================
    function showCardPreview(cardIndex) {
        const card = G.hand[cardIndex];
        if (!card) return;

        const isFree = (G.freeEpicLegend && (card.rarity === 'epic' || card.rarity === 'legend')) || (G.freeNextAttack && card.type === 'attack');
        const displayCost = card.costX ? 'X' : (isFree ? 0 : card.cost);
        const rarityLabel = card.rarity === 'legend' ? '传说' : card.rarity === 'epic' ? '史诗' : card.rarity === 'rare' ? '稀有' : '基础';
        const rarityDot = card.rarity === 'legend' ? '◆' : card.rarity === 'epic' ? '◇' : card.rarity === 'rare' ? '○' : '';
        const typeLabel = card.type === 'attack' ? '攻击' : card.type === 'defense' ? '防御' : card.type === 'mobility' ? '机动' : '特殊';

        let kwHtml = '';
        if (card.exhaust || card.retain || card.innate) {
            kwHtml = '<div class="preview-kw">';
            if (card.exhaust) kwHtml += '<span class="kw-tag exhaust">消耗</span>';
            if (card.retain) kwHtml += '<span class="kw-tag retain">保留</span>';
            if (card.innate) kwHtml += '<span class="kw-tag innate">固有</span>';
            kwHtml += '</div>';
        }

        const previewEl = document.getElementById('cardPreview');
        previewEl.innerHTML = `
            ${rarityDot ? `<div class="preview-rarity ${card.rarity}">${rarityDot} ${rarityLabel}</div>` : '<div class="preview-rarity">基础</div>'}
            <div class="preview-cost ${isFree ? 'free' : ''}">${displayCost}</div>
            <div class="preview-icon">${card.icon}</div>
            <div class="preview-name">${card.name}</div>
            <div class="preview-type ${card.type}">${typeLabel}</div>
            <div class="preview-desc">${card.desc}</div>
            ${kwHtml}
            <div class="preview-hint">松手关闭 · 拖动出牌</div>
        `;

        document.getElementById('cardPreviewOverlay').style.display = 'flex';
    }

    function hideCardPreview() {
        document.getElementById('cardPreviewOverlay').style.display = 'none';
    }

    // ==================== 启动 ====================
    initGame();
    loadData();
    updateMain();
    showClassSelect();
    </script>
</body>
</html>
